version: "3.8"

services:
  mysql:
    image: mysql:8.0
    container_name: testplate-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: testplate
      MYSQL_USER: testplate
      MYSQL_PASSWORD: testplate123
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: testplate-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DATABASE_URL: "mysql+asyncmy://testplate:testplate123@mysql:3306/testplate?charset=utf8mb4"
      DEBUG: "false"
      JWT_SECRET: "testplate-jwt-secret-change-in-production"
      MEDIA_ROOT: "/app/media"
    ports:
      - "8000:8000"
    volumes:
      - backend_media:/app/media
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: testplate-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_BASE: ""
    ports:
      - "3000:3000"

volumes:
  mysql_data:
  backend_media:
